[workspace]
name = "caliber158"
version = "0.1.0"
description = "Ternary micro-network distillation for Qwen MLP chains"
channels = ["https://conda.modular.com/max/", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
mojo = "*"
max = ">=26.3.0,<27"

[activation]
scripts = ["scripts/load-env.sh"]

[tasks]
setup-python = "bash scripts/setup-python.sh"
train = "mojo main.mojo train"
smoke = "mojo main.mojo smoke"
test-grad = "mojo main.mojo test-grad"
test-grad-gpu = "mojo main.mojo test-grad-gpu"
info = "mojo main.mojo info"
extract = "bash scripts/run-python.sh python/extract_chain.py"
train-torch = "bash scripts/run-python.sh python/student/train_chain.py train"
smoke-torch = "bash scripts/run-python.sh python/student/train_chain.py smoke"
test-torch-parity = "bash scripts/run-test-torch-parity.sh"
